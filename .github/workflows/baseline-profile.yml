name: Baseline profile freshness

on:
  workflow_dispatch:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  schedule:
    - cron: "0 3 * * 1"

permissions:
  contents: read

concurrency:
  group: baseline-profile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-baseline-profile:
    name: verify-baseline-profile
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Install compile SDK
        run: >-
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          --sdk_root="${ANDROID_HOME}"
          "platforms;android-37.1"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Regenerate and verify the checked-in profile
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_tablet
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: |
            ./gradlew :app:generateReleaseBaselineProfile \
              -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=BaselineProfile \
              --stacktrace
            git diff --exit-code -- app/src/release/generated/baselineProfiles/

      - name: Upload generated profile diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: baseline-profile-diagnostics
          path: |
            app/src/release/generated/baselineProfiles/
            benchmark/build/outputs/
            benchmark/build/reports/androidTests/
          if-no-files-found: ignore
