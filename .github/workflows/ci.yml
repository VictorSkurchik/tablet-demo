name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Run static analysis, JVM tests, and release verification
        run: >-
          ./gradlew
          ktlintCheck
          detekt
          test
          lint
          :app:verifyReleaseArtifacts
          --dependency-verification strict
          --stacktrace

      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-reports
          path: |
            **/build/reports/detekt/
            **/build/reports/ktlint/
            **/build/reports/lint-results-*
            **/build/reports/tests/
          if-no-files-found: ignore

      - name: Upload unsigned validation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unsigned-validation-artifacts
          path: |
            app/build/outputs/apk/release/
            app/build/outputs/bundle/release/
            app/build/outputs/mapping/release/
          if-no-files-found: error
          retention-days: 3

  android-ui-tests:
    name: android-ui-tests
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Install compile SDK
        run: >-
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          --sdk_root="${ANDROID_HOME}"
          "platforms;android-37.1"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android UI tests and enforce coverage floors
        uses: reactivecircus/android-emulator-runner@4c44018e59b437e86cdfc41da381398f93ed8808 # v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          profile: pixel_tablet
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none -grpc 8554
          script: |
            ./gradlew coverageVerification --stacktrace
            ./gradlew :benchmark:connectedBenchmarkReleaseAndroidTest \
              "-Pandroid.testInstrumentationRunnerArguments.class=by.vsdev.tablet.demo.benchmark.TableMacrobenchmark#maximumTableStartupAndScroll" \
              -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=Macrobenchmark \
              --stacktrace

      - name: Upload Android test reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: android-test-reports
          path: |
            app/build/reports/androidTests/
            ui/build/reports/androidTests/
            benchmark/build/outputs/
            benchmark/build/reports/androidTests/
            build/reports/jacoco/coverageReport/
          if-no-files-found: ignore

  compatibility-smoke:
    name: compatibility-smoke (API ${{ matrix.api }})
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        api:
          - 28
          - 36

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Install compile SDK
        run: >-
          "${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          --sdk_root="${ANDROID_HOME}"
          "platforms;android-37.1"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run compatibility smoke
        uses: reactivecircus/android-emulator-runner@4c44018e59b437e86cdfc41da381398f93ed8808 # v2
        with:
          api-level: ${{ matrix.api }}
          target: google_apis
          arch: x86_64
          profile: pixel_tablet
          disable-animations: true
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -camera-back none
          script: >-
            ./gradlew :app:connectedDebugAndroidTest
            "-Pandroid.testInstrumentationRunnerArguments.class=by.vsdev.tablet.demo.AppJourneyTest#validDimensionsBuildAndOpenTable"
            --stacktrace

      - name: Upload compatibility smoke report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compatibility-smoke-api-${{ matrix.api }}
          path: app/build/reports/androidTests/connected/debug/
          if-no-files-found: ignore
