name: Physical tablet benchmarks

on:
  workflow_dispatch:
    inputs:
      device_serial:
        description: ADB serial of the dedicated physical tablet
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: physical-tablet-benchmark
  cancel-in-progress: false

jobs:
  benchmark:
    name: physical-tablet-benchmark
    if: github.ref == 'refs/heads/main'
    environment: physical-benchmark
    runs-on:
      - self-hosted
      - android
      - physical-tablet
    timeout-minutes: 60
    env:
      ANDROID_SERIAL: ${{ inputs.device_serial }}

    steps:
      - name: Check out repository
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          ref: refs/heads/main
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@90ddb51e90a5fd9ba75f40cf85156b7b41bf76a3 # v6

      - name: Verify dedicated device
        run: |
          test "$(adb -s "${ANDROID_SERIAL}" get-state)" = "device"
          case "$(adb -s "${ANDROID_SERIAL}" shell getprop ro.build.characteristics)" in
            *tablet*) ;;
            *) echo "ANDROID_SERIAL is not a tablet" >&2; exit 1 ;;
          esac

      - name: Run macrobenchmarks
        run: >-
          ./gradlew
          :benchmark:connectedBenchmarkReleaseAndroidTest
          -Pandroid.testInstrumentationRunnerArguments.androidx.benchmark.enabledRules=Macrobenchmark
          --stacktrace

      - name: Upload benchmark reports and traces
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: physical-tablet-benchmark-results
          path: |
            benchmark/build/outputs/
            benchmark/build/reports/androidTests/
          if-no-files-found: error
